name: Build AVANT APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node 18 (Expo 52 official support) ────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ───────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Cache node_modules ─────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node18-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node18-

      # ── 5. Install dependencies ───────────────────────────────
      - name: Install npm packages
        run: npm install --legacy-peer-deps

      # ── 6. Expo prebuild → generates /android folder ─────────
      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1
          NODE_OPTIONS: --no-experimental-fetch

      # ── 7. Inject kotlinVersion into rootProject.ext ─────────
      # Root cause (confirmed by reading ExpoModulesCorePlugin.gradle source):
      #   kotlinVersion() checks rootProject.ext.has("kotlinVersion").
      #   If not found, it falls back to "1.9.24".
      #   Compose Compiler 1.5.15 (bundled with expo-modules-core 2.2.3) needs 1.9.25.
      #   android/build.gradle uses findProperty('android.kotlinVersion') which goes
      #   into a different namespace — rootProject.ext never gets set, so the fallback wins.
      # Fix: prepend ext.kotlinVersion = "1.9.25" to android/build.gradle so
      #   rootProject.ext.has("kotlinVersion") returns true with the right value.
      - name: Inject kotlinVersion=1.9.25 into rootProject.ext
        run: |
          echo "=== Current android/build.gradle head ==="
          head -15 android/build.gradle

          # Prepend the ext block before anything else in build.gradle
          python3 - << 'PYEOF'
          with open('android/build.gradle', 'r') as f:
              content = f.read()
          inject = '// Injected by CI: force Kotlin 1.9.25 for Compose Compiler 1.5.15 compatibility\next.kotlinVersion = "1.9.25"\n\n'
          with open('android/build.gradle', 'w') as f:
              f.write(inject + content)
          print("Done - injected ext.kotlinVersion = 1.9.25")
          PYEOF

          echo "=== After injection: android/build.gradle head ==="
          head -10 android/build.gradle

      # ── 8. Make gradlew executable ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build debug APK ────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      # ── 10. Upload APK as artifact ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVANT-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Print download instructions ───────────────────────
      - name: APK build complete
        run: |
          echo "✅ AVANT APK built successfully"
          echo ""
          echo "To download:"
          echo "  1. Go to https://github.com/BridgeLine-Services/AVANT-APP/actions"
          echo "  2. Click the latest 'Build AVANT APK' run"
          echo "  3. Scroll to 'Artifacts' → click 'AVANT-debug-apk' to download"
          echo "  4. Unzip → install app-debug.apk on your Android phone"
