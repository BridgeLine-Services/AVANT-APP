name: Build AVANT APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node 18 ───────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ───────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Cache node_modules ─────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node18-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node18-

      # ── 5. Install dependencies ───────────────────────────────
      - name: Install npm packages
        run: npm install --legacy-peer-deps

      # ── 6. ROOT CAUSE FIX ────────────────────────────────────
      # Deep investigation revealed the actual source of Kotlin 1.9.24:
      #
      # @react-native/gradle-plugin (inside node_modules) ships its own
      # gradle/libs.versions.toml with:  kotlin = "1.9.24"
      # This file is used to compile the gradle-plugin subproject that is
      # included directly in the Android build via settings.gradle.
      # That compiled plugin loads kotlin-gradle-plugin 1.9.24 into the
      # Gradle classpath — making 1.9.24 the ACTUAL compiler, regardless
      # of what ext.kotlinVersion says.
      #
      # Compose Compiler 1.5.15 (in expo-modules-core 2.2.3) requires 1.9.25.
      # Fix: patch libs.versions.toml before prebuild runs.
      - name: Patch @react-native/gradle-plugin kotlin version 1.9.24 → 1.9.25
        run: |
          TOML="node_modules/@react-native/gradle-plugin/gradle/libs.versions.toml"
          echo "=== Before patch ==="
          cat "$TOML"
          sed -i 's/kotlin = "1\.9\.24"/kotlin = "1.9.25"/' "$TOML"
          echo "=== After patch ==="
          cat "$TOML"

      # ── 7. Expo prebuild → generates /android folder ─────────
      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1
          NODE_OPTIONS: --no-experimental-fetch

      # ── 8. Make gradlew executable ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build debug APK ────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      # ── 10. Upload APK as artifact ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AVANT-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Done ──────────────────────────────────────────────
      - name: APK build complete
        run: |
          echo "✅ AVANT APK built successfully"
          echo ""
          echo "To download:"
          echo "  1. Go to https://github.com/BridgeLine-Services/AVANT-APP/actions"
          echo "  2. Click the latest 'Build AVANT APK' run"
          echo "  3. Scroll to 'Artifacts' → click 'AVANT-debug-apk' to download"
          echo "  4. Unzip → install app-debug.apk on your Android phone"
