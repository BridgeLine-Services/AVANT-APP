name: Build AVANT APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node18-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node18-

      - name: Install npm packages
        run: npm install --legacy-peer-deps

      # Install the RN CLI explicitly — it's needed by react-native bundle
      # but not listed in package.json devDependencies
      - name: Install React Native CLI
        run: npm install --no-save @react-native-community/cli@15

      - name: Patch kotlin version in gradle-plugin
        run: |
          TOML="node_modules/@react-native/gradle-plugin/gradle/libs.versions.toml"
          sed -i 's/kotlin = "1\.9\.24"/kotlin = "1.9.25"/' "$TOML"
          grep 'kotlin = ' "$TOML"

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_GIT_STATUS: 1
          NODE_OPTIONS: --no-experimental-fetch

      # Bundle all JS/TS into a single file and embed it in the APK.
      # This is what makes the APK standalone — no Metro dev server needed.
      # Without this step, the app shows "Unable to load script" on launch.
      - name: Bundle JavaScript into APK assets
        run: |
          mkdir -p android/app/src/main/assets
          node_modules/.bin/react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache
          echo "Bundle size: $(du -sh android/app/src/main/assets/index.android.bundle)"
        env:
          NODE_ENV: production
          NODE_OPTIONS: --no-experimental-fetch

      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          ls -la android/app/debug.keystore

      - name: Add release signing config to app/build.gradle
        run: |
          python3 << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          if 'signingConfigs' not in content:
              signing = (
                  "\n    signingConfigs {\n"
                  "        release {\n"
                  "            storeFile file('debug.keystore')\n"
                  "            storePassword 'android'\n"
                  "            keyAlias 'androiddebugkey'\n"
                  "            keyPassword 'android'\n"
                  "        }\n"
                  "    }\n"
              )
              content = content.replace('    buildTypes {', signing + '    buildTypes {')

          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace(
                  'buildTypes {\n        release {',
                  'buildTypes {\n        release {\n            signingConfig signingConfigs.release\n            shrinkResources false\n            minifyEnabled false'
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Signing config applied")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          ls -lh "$APK"
          echo "SUCCESS — APK size: $(du -sh $APK | cut -f1)"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: AVANT-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
